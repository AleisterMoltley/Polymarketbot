name: Deploy to Railway
on: [push]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build
      - name: Check Railway token
        if: ${{ secrets.RAILWAY_TOKEN == '' }}
        run: |
          echo "::error::RAILWAY_TOKEN secret is not set. Please add your Railway token to the repository secrets."
          echo "To fix this:"
          echo "1. Go to your Railway project settings and generate an API token"
          echo "2. Navigate to your GitHub repository -> Settings -> Secrets and variables -> Actions"
          echo "3. Add a new repository secret named RAILWAY_TOKEN with your Railway API token"
          exit 1
      - name: Deploy
        run: npx @railway/cli up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}