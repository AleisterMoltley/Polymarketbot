<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polymarketbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 1.25rem; color: #e6edf3; }
    header span { font-size: 0.8rem; background: #238636; color: #fff; padding: 2px 8px; border-radius: 12px; }
    nav {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      gap: 4px;
      padding: 0 32px;
    }
    nav button {
      background: none;
      border: none;
      color: #8b949e;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 12px 16px;
      border-bottom: 2px solid transparent;
    }
    nav button.active { color: #e6edf3; border-bottom-color: #f78166; }
    main { flex: 1; padding: 32px; }
    .tab { display: none; }
    .tab.active { display: block; }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h2 { font-size: 1rem; color: #e6edf3; margin-bottom: 12px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
    .stat { background: #0d1117; border-radius: 6px; padding: 16px; text-align: center; }
    .stat .value { font-size: 2rem; font-weight: 700; color: #58a6ff; }
    .stat .label { font-size: 0.75rem; color: #8b949e; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; color: #8b949e; padding: 8px 12px; border-bottom: 1px solid #30363d; }
    td { padding: 8px 12px; border-bottom: 1px solid #21262d; }
    tr:hover td { background: #1c2128; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem;
    }
    .badge-open   { background: #1f6feb; color: #fff; }
    .badge-filled { background: #238636; color: #fff; }
    .badge-cancelled { background: #6e7681; color: #fff; }
    .badge-paper  { background: #9e6a03; color: #fff; }
    pre { background: #0d1117; border-radius: 6px; padding: 16px; overflow: auto; font-size: 0.8rem; color: #a5d6ff; }
    footer { text-align: center; padding: 16px; color: #484f58; font-size: 0.75rem; }
  </style>
</head>
<body>
  <header>
    <h1>🤖 Polymarketbot</h1>
    <span id="mode-badge">paper</span>
  </header>
  <nav>
    <button class="active" onclick="showTab('dashboard', this)">Dashboard</button>
    <button onclick="showTab('trades', this)">Trades</button>
    <button onclick="showTab('store', this)">Store</button>
  </nav>
  <main>
    <!-- Dashboard tab -->
    <div id="tab-dashboard" class="tab active">
      <div class="card">
        <h2>Live Stats</h2>
        <div class="stats-grid" id="stats-grid">
          <div class="stat"><div class="value" id="stat-total">—</div><div class="label">Total Trades</div></div>
          <div class="stat"><div class="value" id="stat-open">—</div><div class="label">Open</div></div>
          <div class="stat"><div class="value" id="stat-filled">—</div><div class="label">Filled</div></div>
          <div class="stat"><div class="value" id="stat-pnl">—</div><div class="label">Total PnL (USDC)</div></div>
          <div class="stat"><div class="value" id="stat-paper">—</div><div class="label">Paper Trades</div></div>
          <div class="stat"><div class="value" id="stat-live">—</div><div class="label">Live Trades</div></div>
        </div>
      </div>
    </div>

    <!-- Trades tab -->
    <div id="tab-trades" class="tab">
      <div class="card">
        <h2>Trade History</h2>
        <table>
          <thead>
            <tr><th>ID</th><th>Market</th><th>Side</th><th>Outcome</th><th>Price</th><th>Size</th><th>Status</th><th>Mode</th><th>PnL</th></tr>
          </thead>
          <tbody id="trades-tbody"><tr><td colspan="9" style="color:#484f58">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Store tab -->
    <div id="tab-store" class="tab">
      <div class="card">
        <h2>In-Memory Store Snapshot</h2>
        <pre id="store-pre">Loading…</pre>
      </div>
    </div>
  </main>
  <footer>Polymarketbot — <span id="ts"></span></footer>

  <script>
    function showTab(name, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      btn.classList.add('active');
      if (name === 'trades') loadTrades();
      if (name === 'store') loadStore();
    }

    // ── WebSocket for live stats ──────────────────────────────────────────
    const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(wsProtocol + '//' + location.host);
    ws.addEventListener('message', ({ data }) => {
      try {
        const { event, data: payload } = JSON.parse(data);
        if (event === 'stats') renderStats(payload);
      } catch {}
    });
    setInterval(() => { if (ws.readyState === 1) ws.send(JSON.stringify({ command: 'stats' })); }, 10000);

    function renderStats(s) {
      document.getElementById('stat-total').textContent  = s.totalTrades;
      document.getElementById('stat-open').textContent   = s.openTrades;
      document.getElementById('stat-filled').textContent = s.filledTrades;
      document.getElementById('stat-pnl').textContent    = s.totalPnl;
      document.getElementById('stat-paper').textContent  = s.paperTrades;
      document.getElementById('stat-live').textContent   = s.liveTrades;
      document.getElementById('ts').textContent = new Date().toLocaleTimeString();
    }

    // ── Trades ────────────────────────────────────────────────────────────
    async function loadTrades() {
      const res = await fetch('/admin/trades');
      const trades = await res.json();
      const tbody = document.getElementById('trades-tbody');
      if (!trades.length) { tbody.innerHTML = '<tr><td colspan="9" style="color:#484f58">No trades yet.</td></tr>'; return; }
      tbody.innerHTML = trades.map(t => `
        <tr>
          <td title="${t.id}">${t.id.slice(0, 14)}…</td>
          <td title="${t.market}">${t.market.slice(0, 10)}…</td>
          <td>${t.side}</td>
          <td>${t.outcome}</td>
          <td>${t.price}</td>
          <td>${t.size}</td>
          <td><span class="badge badge-${t.status.toLowerCase()}">${t.status}</span></td>
          <td><span class="badge ${t.paper ? 'badge-paper' : ''}">${t.paper ? 'paper' : 'live'}</span></td>
          <td>${t.pnl ?? '—'}</td>
        </tr>`).join('');
    }

    // ── Store ─────────────────────────────────────────────────────────────
    async function loadStore() {
      const res = await fetch('/admin/store');
      document.getElementById('store-pre').textContent = JSON.stringify(await res.json(), null, 2);
    }
  </script>
</body>
</html>
